
services:
  # ── MySQL 8 ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: code-reviewer-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-code_reviewer}
      MYSQL_USER: ${DB_USER:-codereviewer}
      MYSQL_PASSWORD: ${DB_PASS:-rootpassword}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - code-reviewer-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: code-reviewer-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - code-reviewer-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Spring Boot Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: code-reviewer-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-code_reviewer}
      DB_USER: ${DB_USER:-codereviewer}
      DB_PASS: ${DB_PASS:-rootpassword}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-yourSuperLongSecretKeyAtLeast256BitsForHS256Algorithm}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-placeholder}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-1.5-flash}
      JAVA_TOOL_OPTIONS: "-Dapp.gemini.model=${GEMINI_MODEL:-gemini-1.5-flash}"
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80,http://localhost:5173}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:80}
    ports:
      - "8080:8080"
    networks:
      - code-reviewer-network
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8080' 2>/dev/null && echo ok || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ── React Frontend ────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost/api}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: code-reviewer-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - code-reviewer-network

networks:
  code-reviewer-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
