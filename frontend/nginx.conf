server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression (not for SSE streams)
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1024;

    # ── SSE streaming endpoint — must not buffer ─────────────────────────────
    location /api/review/stream {
        proxy_pass         http://backend:8080;
        # HTTP/1.0 avoids chunked transfer-encoding (fixes ERR_INCOMPLETE_CHUNKED_ENCODING)
        proxy_http_version 1.0;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        close;

        # Critical for SSE: disable ALL buffering
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         180s;
        proxy_connect_timeout      15s;
        proxy_send_timeout         180s;

        # Disable gzip for event streams
        gzip                       off;
        add_header                 X-Accel-Buffering no;
        add_header                 Cache-Control     no-cache;
    }

    # ── All other API requests ────────────────────────────────────────────────
    location /api {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        keep-alive;
        proxy_read_timeout 60s;
        proxy_connect_timeout 15s;
    }

    # ── React SPA routing ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ───────────────────────────────────────────────────
    location /assets {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
}
