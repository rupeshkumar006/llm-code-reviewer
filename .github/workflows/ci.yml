# Badge URL: 
# ![CI](https://github.com/rupeshkumar06/llm-code-reviewer/actions/workflows/ci.yml/badge.svg)

name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          key: maven-${{ hashFiles('**/pom.xml') }}
          path: ~/.m2

      - name: Run Maven build
        run: cd backend && mvn clean package -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          key: npm-${{ hashFiles('frontend/package-lock.json') }}
          path: frontend/node_modules

      - name: Run frontend build
        run: cd frontend && npm ci && npm run build

      - name: Confirm dist/ folder was created
        run: ls -la frontend/dist

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: docker build -t code-reviewer-backend ./backend

      - name: Build frontend Docker image
        run: docker build -t code-reviewer-frontend ./frontend

      - name: Confirm both images built successfully
        run: |
          docker image inspect code-reviewer-backend
          docker image inspect code-reviewer-frontend

      - name: Success confirmation
        run: echo "Build successful — ready for deployment"
